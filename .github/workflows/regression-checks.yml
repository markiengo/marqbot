name: Regression Checks

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: regression-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-regression:
    name: Backend Regression (Non-Nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend regression suite without nightly sweep
        env:
          PYTHONPATH: backend:tests/backend
        run: python -m pytest tests/backend --ignore=tests/backend/test_dead_end_fast.py -m "not nightly" -q

  planner-fast-guardrail:
    name: Planner Fast Guardrail
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Run fast dead-end planner guardrail
        env:
          PYTHONPATH: backend:tests/backend
        run: python -m pytest tests/backend/test_dead_end_fast.py -q

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test
