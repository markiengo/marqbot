name: Nightly Sweep

on:
  pull_request:
  schedule:
    # GitHub Actions cron is UTC only.
    # 07:00 UTC = 2:00 AM CDT
    # 08:00 UTC = 2:00 AM CST
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-sweep-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── PR gate jobs (run on pull_request + workflow_dispatch) ──────────────

  backend-regression:
    name: Backend Regression
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests (non-nightly)
        env:
          PYTHONPATH: backend:tests/backend
        run: python -m pytest tests/backend --ignore=tests/backend/test_dead_end_fast.py -m "not nightly" -q

  planner-fast:
    name: Planner Fast Guardrail
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run fast dead-end checks
        env:
          PYTHONPATH: backend:tests/backend
        run: python -m pytest tests/backend/test_dead_end_fast.py -q

  frontend:
    name: Frontend Tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  # ── Nightly exhaustive sweep (schedule + workflow_dispatch) ─────────────

  nightly-exhaustive:
    name: Nightly Focused Sweep
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Check Milwaukee local time
        if: github.event_name == 'schedule'
        id: milwaukee_time
        shell: bash
        run: |
          local_hour="$(TZ=America/Chicago date +%H)"
          local_time="$(TZ=America/Chicago date +%H:%M)"
          echo "local_time=$local_time" >> "$GITHUB_OUTPUT"
          # Match on hour (02) instead of exact minute — GitHub cron can fire late
          if [ "$local_hour" = "02" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show schedule decision
        if: github.event_name == 'schedule'
        run: echo "Milwaukee local time is ${{ steps.milwaukee_time.outputs.local_time }}. should_run=${{ steps.milwaukee_time.outputs.should_run }}"

      - name: Install dependencies
        if: github.event_name != 'schedule' || steps.milwaukee_time.outputs.should_run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Run nightly focused sweep
        if: github.event_name != 'schedule' || steps.milwaukee_time.outputs.should_run == 'true'
        id: nightly_run
        env:
          PYTHONPATH: backend:tests/backend
        run: |
          python -m pytest -m nightly -q 2>&1 | tee nightly_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Generate fallback report on collection failure
        if: (github.event_name != 'schedule' || steps.milwaukee_time.outputs.should_run == 'true') && steps.nightly_run.outputs.exit_code != '0'
        run: |
          mkdir -p tests/nightly_reports
          if [ ! -f tests/nightly_reports/$(date +%Y-%m-%d).md ]; then
            echo "# Nightly Sweep — COLLECTION ERROR" > tests/nightly_reports/$(date +%Y-%m-%d).md
            echo "" >> tests/nightly_reports/$(date +%Y-%m-%d).md
            echo "Pytest exited with code ${{ steps.nightly_run.outputs.exit_code }} and no report was generated." >> tests/nightly_reports/$(date +%Y-%m-%d).md
            echo "" >> tests/nightly_reports/$(date +%Y-%m-%d).md
            echo '```' >> tests/nightly_reports/$(date +%Y-%m-%d).md
            tail -50 nightly_output.txt >> tests/nightly_reports/$(date +%Y-%m-%d).md
            echo '```' >> tests/nightly_reports/$(date +%Y-%m-%d).md
          fi

      - name: Upload nightly report
        if: github.event_name != 'schedule' || steps.milwaukee_time.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: nightly-sweep-report
          path: tests/nightly_reports/*.md
          if-no-files-found: warn
          retention-days: 14
