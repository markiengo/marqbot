name: Nightly Sweep

on:
  pull_request:
  schedule:
    # Single nightly run at 07:00 UTC.
    # This is 3:00 AM in New York during daylight saving time.
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-sweep-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── PR gate jobs (run on pull_request + workflow_dispatch) ──────────────

  backend-regression:
    name: Backend Regression
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests (non-nightly)
        env:
          PYTHONPATH: backend:tests/backend
        run: python -m pytest tests/backend --ignore=tests/backend/test_dead_end_fast.py -m "not nightly" -q

  planner-fast:
    name: Planner Fast Guardrail
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run fast dead-end checks
        env:
          PYTHONPATH: backend:tests/backend
        run: python -m pytest tests/backend/test_dead_end_fast.py -m "not nightly" -q

  frontend:
    name: Frontend Tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  # ── Nightly exhaustive sweep (schedule + workflow_dispatch) ─────────────

  nightly-exhaustive:
    name: Nightly Focused Sweep
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      report_date: ${{ steps.report_meta.outputs.report_date }}
      report_path: ${{ steps.report_meta.outputs.report_path }}
      report_json_path: ${{ steps.report_meta.outputs.report_json_path }}
      pytest_exit_code: ${{ steps.nightly_run.outputs.exit_code }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Prepare nightly report file
        id: report_meta
        shell: bash
        run: |
          report_date="$(TZ=America/New_York date +%Y-%m-%d)"
          mkdir -p tests/nightly_reports
          rm -f tests/nightly_reports/*.md tests/nightly_reports/*.json
          echo "report_date=$report_date" >> "$GITHUB_OUTPUT"
          echo "report_path=tests/nightly_reports/$report_date.md" >> "$GITHUB_OUTPUT"
          echo "report_json_path=tests/nightly_reports/$report_date.json" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run nightly focused sweep
        id: nightly_run
        shell: bash
        env:
          PYTHONPATH: backend:tests/backend
          NIGHTLY_REPORT_DATE: ${{ steps.report_meta.outputs.report_date }}
        run: |
          set +e
          python -m pytest -m nightly -q 2>&1 | tee nightly_output.txt
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 1 ]; then
            echo "Nightly catalog/data issues were recorded in the report; keeping the workflow green."
          fi
          exit 0

      - name: Generate fallback report on collection failure
        if: steps.nightly_run.outputs.exit_code != '0'
        run: |
          if [ ! -f "${{ steps.report_meta.outputs.report_path }}" ]; then
            echo "# Nightly Planner Report - COLLECTION ERROR" > "${{ steps.report_meta.outputs.report_path }}"
            echo "" >> "${{ steps.report_meta.outputs.report_path }}"
            echo "Pytest exited with code ${{ steps.nightly_run.outputs.exit_code }} and no report was generated." >> "${{ steps.report_meta.outputs.report_path }}"
            echo "" >> "${{ steps.report_meta.outputs.report_path }}"
            echo '```' >> "${{ steps.report_meta.outputs.report_path }}"
            tail -50 nightly_output.txt >> "${{ steps.report_meta.outputs.report_path }}"
            echo '```' >> "${{ steps.report_meta.outputs.report_path }}"
          fi

      - name: Upload nightly report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-sweep-report-${{ steps.report_meta.outputs.report_date }}
          path: |
            ${{ steps.report_meta.outputs.report_path }}
            ${{ steps.report_meta.outputs.report_json_path }}
          if-no-files-found: warn
          retention-days: 14

      - name: Fail on nightly runner errors
        if: ${{ steps.nightly_run.outputs.exit_code != '0' && steps.nightly_run.outputs.exit_code != '1' }}
        run: |
          echo "Pytest exited with code ${{ steps.nightly_run.outputs.exit_code }}."
          exit 1

  nightly-analyze:
    name: Nightly Auto-Tune
    if: github.event_name != 'pull_request'
    needs: nightly-exhaustive
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Download nightly report artifact
        uses: actions/download-artifact@v4
        with:
          name: nightly-sweep-report-${{ needs.nightly-exhaustive.outputs.report_date }}
          path: tests/nightly_reports

      - name: Analyze nightly report
        id: analyze
        shell: bash
        env:
          PYTHONPATH: backend:tests/backend:scripts
        run: |
          test -f "${{ needs.nightly-exhaustive.outputs.report_json_path }}"
          python scripts/analyze_nightly.py \
            --report "${{ needs.nightly-exhaustive.outputs.report_json_path }}" \
            --summary-out nightly_analysis_summary.json \
            --pr-body-out nightly_analysis_pr_body.md
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          with open("nightly_analysis_summary.json", encoding="utf-8") as f:
              summary = json.load(f)
          print(f"override_change_count={summary['override_change_count']}")
          print(f"queue_count={summary['queue_count']}")
          PY

      - name: Detect config changes
        id: detect_changes
        shell: bash
        run: |
          if git diff --quiet -- config/ranking_overrides.json config/data_investigation_queue.json; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "branch_name=nightly-tuning/${{ needs.nightly-exhaustive.outputs.report_date }}" >> "$GITHUB_OUTPUT"

      - name: Commit and push nightly tuning branch
        if: steps.detect_changes.outputs.has_changes == 'true'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${{ steps.detect_changes.outputs.branch_name }}"
          git add config/ranking_overrides.json config/data_investigation_queue.json
          git commit -m "Nightly auto-tune ${{ needs.nightly-exhaustive.outputs.report_date }}"
          git push --force origin "${{ steps.detect_changes.outputs.branch_name }}"

      - name: Create or update nightly tuning PR
        if: steps.detect_changes.outputs.has_changes == 'true'
        id: pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          base_branch="${{ github.event.repository.default_branch }}"
          branch_name="${{ steps.detect_changes.outputs.branch_name }}"
          pr_number="$(gh pr list --head "$branch_name" --base "$base_branch" --state open --json number --jq '.[0].number')"
          if [ -n "$pr_number" ]; then
            gh pr edit "$pr_number" \
              --title "Nightly auto-tune: ${{ needs.nightly-exhaustive.outputs.report_date }}" \
              --body-file nightly_analysis_pr_body.md
          else
            gh pr create \
              --base "$base_branch" \
              --head "$branch_name" \
              --title "Nightly auto-tune: ${{ needs.nightly-exhaustive.outputs.report_date }}" \
              --body-file nightly_analysis_pr_body.md
            pr_number="$(gh pr list --head "$branch_name" --base "$base_branch" --state open --json number --jq '.[0].number')"
          fi
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for small override changes
        if: steps.detect_changes.outputs.has_changes == 'true' && steps.pr.outputs.pr_number != '' && fromJSON(steps.analyze.outputs.override_change_count) <= 3
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge "${{ steps.pr.outputs.pr_number }}" --auto --squash --delete-branch
