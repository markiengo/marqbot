name: Nightly Sweep

on:
  pull_request:
  schedule:
    # Single nightly run at 07:00 UTC.
    # This is 3:00 AM in New York during daylight saving time.
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-sweep-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── PR gate jobs (run on pull_request + workflow_dispatch) ──────────────

  backend-regression:
    name: Backend Regression
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run backend tests (non-nightly)
        env:
          PYTHONPATH: backend:tests/backend
        run: python -m pytest tests/backend --ignore=tests/backend/test_dead_end_fast.py -m "not nightly" -q

  planner-fast:
    name: Planner Fast Guardrail
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run fast dead-end checks
        env:
          PYTHONPATH: backend:tests/backend
        run: python -m pytest tests/backend/test_dead_end_fast.py -m "not nightly" -q

  frontend:
    name: Frontend Tests
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

  # ── Nightly exhaustive sweep (schedule + workflow_dispatch) ─────────────

  nightly-exhaustive:
    name: Nightly Focused Sweep
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Prepare nightly report file
        id: report_meta
        shell: bash
        run: |
          report_date="$(TZ=America/New_York date +%Y-%m-%d)"
          mkdir -p tests/nightly_reports
          rm -f tests/nightly_reports/*.md
          echo "report_date=$report_date" >> "$GITHUB_OUTPUT"
          echo "report_path=tests/nightly_reports/$report_date.md" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run nightly focused sweep
        id: nightly_run
        shell: bash
        env:
          PYTHONPATH: backend:tests/backend
          NIGHTLY_REPORT_DATE: ${{ steps.report_meta.outputs.report_date }}
        run: |
          set +e
          python -m pytest -m nightly -q 2>&1 | tee nightly_output.txt
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          if [ "$exit_code" -eq 1 ]; then
            echo "Nightly catalog/data issues were recorded in the report; keeping the workflow green."
          fi
          exit 0

      - name: Generate fallback report on collection failure
        if: steps.nightly_run.outputs.exit_code != '0'
        run: |
          if [ ! -f "${{ steps.report_meta.outputs.report_path }}" ]; then
            echo "# Nightly Planner Report - COLLECTION ERROR" > "${{ steps.report_meta.outputs.report_path }}"
            echo "" >> "${{ steps.report_meta.outputs.report_path }}"
            echo "Pytest exited with code ${{ steps.nightly_run.outputs.exit_code }} and no report was generated." >> "${{ steps.report_meta.outputs.report_path }}"
            echo "" >> "${{ steps.report_meta.outputs.report_path }}"
            echo '```' >> "${{ steps.report_meta.outputs.report_path }}"
            tail -50 nightly_output.txt >> "${{ steps.report_meta.outputs.report_path }}"
            echo '```' >> "${{ steps.report_meta.outputs.report_path }}"
          fi

      - name: Upload nightly report
        uses: actions/upload-artifact@v6
        with:
          name: nightly-sweep-report-${{ steps.report_meta.outputs.report_date }}
          path: ${{ steps.report_meta.outputs.report_path }}
          if-no-files-found: warn
          retention-days: 14

      - name: Fail on nightly runner errors
        if: ${{ steps.nightly_run.outputs.exit_code != '0' && steps.nightly_run.outputs.exit_code != '1' }}
        run: |
          echo "Pytest exited with code ${{ steps.nightly_run.outputs.exit_code }}."
          exit 1
