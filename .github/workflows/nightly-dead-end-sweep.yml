name: Nightly Exhaustive Planner Sweep

on:
  schedule:
    # GitHub Actions cron is UTC only.
    # 07:39 UTC = 2:39 AM CDT
    # 08:39 UTC = 2:39 AM CST
    - cron: "39 7 * * *"
    - cron: "39 8 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-exhaustive-planner-sweep
  cancel-in-progress: false

jobs:
  nightly-exhaustive-planner:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Check Milwaukee local time
        id: milwaukee_time
        shell: bash
        run: |
          local_time="$(TZ=America/Chicago date +%H:%M)"
          echo "local_time=$local_time" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" != "schedule" ] || [ "$local_time" = "02:39" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show schedule decision
        run: echo "Milwaukee local time is ${{ steps.milwaukee_time.outputs.local_time }}. should_run=${{ steps.milwaukee_time.outputs.should_run }}"

      - name: Install dependencies
        if: steps.milwaukee_time.outputs.should_run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Run exhaustive nightly planner sweep
        if: steps.milwaukee_time.outputs.should_run == 'true'
        env:
          PYTHONPATH: backend:tests/backend
        run: python -m pytest -m nightly -q
