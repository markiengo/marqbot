services:
  - type: web
    name: marqbot
    runtime: docker
    dockerfilePath: ./infra/docker/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: WEB_CONCURRENCY
        value: "4"
      - key: GUNICORN_TIMEOUT
        value: "90"
      - key: GUNICORN_GRACEFUL_TIMEOUT
        value: "30"
      - key: REQUEST_CACHE_SIZE
        value: "128"
      - key: SLOW_REQUEST_LOG_MS
        value: "750"
